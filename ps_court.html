<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PS Court</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #F5C842;
  --bronze: #e8a060;
  --silver: #A8C0D6;
  --green: #2ECC71;
  --bg: #080C10;
  --surface: #0E1318;
  --surface2: #141A22;
  --surface3: #1C2430;
  --border: rgba(255,255,255,0.08);
  --text: #F0F4F8;
  --text-dim: #7A8FA0;
  --red: #f87171;
  --radius: 20px;
  --radius-sm: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── 헤더 ── */
.header {
  padding: 24px 48px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 3px;
  color: var(--gold);
}
.header-sub { font-size: 15px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }
.header-right { text-align: right; }
.step-indicator {
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 700;
  letter-spacing: 1px;
}
.step-dots { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--surface3);
  transition: all 0.3s;
}
.step-dot.active { background: var(--gold); width: 30px; border-radius: 5px; }
.step-dot.done { background: var(--green); }

/* ── 메인 콘텐츠 ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
  -webkit-overflow-scrolling: touch;
}

/* ── 화면 전환 ── */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── STEP 1: 리그 선택 ── */
.screen-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  line-height: 1;
}
.screen-sub {
  font-size: 18px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 40px;
}

.league-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  max-width: 800px;
}
.league-btn {
  padding: 56px 32px;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'Pretendard', sans-serif;
}
.league-btn:active { transform: scale(0.97); }
.league-btn.gold-btn:active, .league-btn.gold-btn.on {
  border-color: var(--gold);
  background: rgba(245,200,66,0.08);
}
.league-btn.bs-btn:active, .league-btn.bs-btn.on {
  border-color: var(--bronze);
  background: rgba(232,160,96,0.08);
}
.league-icon { font-size: 64px; margin-bottom: 16px; }
.league-name {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.league-desc { font-size: 16px; color: var(--text-dim); font-weight: 600; }

/* ── STEP 2: 선수 선택 ── */
.player-grid-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.p-chip {
  padding: 24px 16px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  user-select: none;
  font-family: 'Pretendard', sans-serif;
}
.p-chip:active { transform: scale(0.95); }
.p-chip.on {
  background: rgba(46,204,113,0.12);
  border-color: var(--green);
  color: var(--green);
}
.sel-count {
  font-size: 18px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 16px;
}
.sel-count em { color: var(--gold); font-style: normal; font-weight: 800; }

/* ── STEP 3: 팀 배정 ── */
.team-display {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 20px;
  align-items: center;
  margin-bottom: 28px;
  max-width: 800px;
}
.team-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
}
.team-box.team-a { border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.05); }
.team-box.team-b { border-color: rgba(245,200,66,0.3); background: rgba(245,200,66,0.04); }
.team-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 16px;
  color: var(--text-dim);
}
.team-box.team-a .team-label { color: var(--green); }
.team-box.team-b .team-label { color: var(--gold); }
.team-player {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  padding: 8px 0;
  line-height: 1.3;
}
.vs-box {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-align: center;
}
.used-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(248,113,113,0.12);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
  margin-bottom: 12px;
}
.ok-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(46,204,113,0.12);
  color: var(--green);
  border: 1px solid rgba(46,204,113,0.3);
  margin-bottom: 12px;
}

.no-combo-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 18px;
  font-weight: 600;
  line-height: 2;
}

/* ── STEP 4: 스코어 ── */
/* ── 스코어 입력 (앱 스타일) ── */
.score-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 0;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}
.set-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.set-tab {
  flex: 1;
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: 'Pretendard', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.set-tab.active { background: var(--surface3); border-color: var(--gold); color: var(--gold); }
.set-tab-add {
  flex: 0 0 auto;
  padding: 16px 20px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  transition: all 0.2s;
}
.set-tab-add:active { background: var(--surface); }

.score-board {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  flex: 1;
}
.score-side {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px 20px;
}
.score-side.side-a { border-color: rgba(46,204,113,0.3); }
.score-side.side-b { border-color: rgba(245,200,66,0.25); }
.score-side-name {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  line-height: 1.4;
}
.score-side.side-a .score-side-name { color: var(--green); }
.score-side.side-b .score-side-name { color: var(--gold); }
.score-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 160px;
  line-height: 1;
  color: var(--text);
}
.score-side.side-a .score-big { color: var(--green); }
.score-side.side-b .score-big { color: var(--gold); }
.score-btns {
  display: flex;
  gap: 16px;
}
.score-btn {
  width: 120px; height: 120px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 56px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  font-family: 'Pretendard', sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.score-btn:active { transform: scale(0.92); background: var(--surface3); }
.score-btn.plus { background: var(--surface3); font-size: 60px; }

/* ── 푸터 버튼 ── */
.footer {
  padding: 20px 48px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
  flex-shrink: 0;
  background: rgba(8,12,16,0.95);
}
.btn {
  flex: 1;
  padding: 24px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Pretendard', sans-serif;
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn:active { transform: scale(0.97); }
.btn-back {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  flex: 0 0 auto;
  padding: 24px 36px;
}
.btn-primary {
  background: var(--gold);
  color: #000;
}
.btn-primary:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.btn-green {
  background: var(--green);
  color: #000;
}
.btn-shuffle {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-save {
  background: var(--green);
  color: #000;
}
.btn-danger {
  background: rgba(248,113,113,0.15);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
  flex: 0 0 auto;
  padding: 24px 36px;
}

/* ── 완료 화면 ── */
.done-screen {
  text-align: center;
  padding: 40px 20px;
}
.done-icon { font-size: 72px; margin-bottom: 20px; }
.done-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 2px;
  color: var(--green);
  margin-bottom: 8px;
}
.done-sub { font-size: 16px; color: var(--text-dim); font-weight: 600; margin-bottom: 32px; }
.done-result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 480px;
  margin: 0 auto 24px;
  font-size: 18px;
  font-weight: 700;
  line-height: 2;
}

/* 로딩 */
.loading-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 18px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--surface3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--surface3);
  color: var(--text);
  padding: 14px 28px;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 700;
  border: 1px solid var(--border);
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div>
    <div class="header-logo">PS COURT</div>
    <div class="header-sub">MATCH SETUP</div>
  </div>
  <div class="header-right">
    <div id="fb-status" style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:4px">🔴 Firebase 연결 중...</div>
    <div class="step-indicator" id="step-label">STEP 1 / 4</div>
    <div class="step-dots">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
      <div class="step-dot" id="dot-3"></div>
      <div class="step-dot" id="dot-4"></div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div class="main">

  <!-- STEP 1: 리그 선택 -->
  <div class="screen active" id="screen-1">
    <div class="screen-title">리그 선택</div>
    <div class="screen-sub">오늘 플레이할 리그를 선택해주세요</div>
    <div class="league-grid">
      <div class="league-btn gold-btn" onclick="selectLeague('gold')">
        <div class="league-icon">🥇</div>
        <div class="league-name" style="color:var(--gold)">GOLD+</div>
      </div>
      <div class="league-btn bs-btn" onclick="selectLeague('bs')">
        <div class="league-icon">🥉🥈</div>
        <div class="league-name" style="color:var(--bronze)">B &amp; S</div>
        <div class="league-desc">Bronze · Silver</div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 선수 선택 -->
  <div class="screen" id="screen-2">
    <div class="screen-title">선수 선택</div>
    <div class="screen-sub">오늘 참여할 선수를 선택해주세요 (최소 4명)</div>
    <div class="sel-count" id="sel-count">선택된 선수: <em>0명</em></div>
    <div id="player-grid-wrap" class="player-grid-wrap">
      <div class="loading-msg"><div class="spinner"></div>선수 목록 불러오는 중...</div>
    </div>
  </div>

  <!-- STEP 3: 팀 배정 -->
  <div class="screen" id="screen-3">
    <div class="screen-title">팀 배정</div>
    <div class="screen-sub" id="team-sub">랜덤 팀이 배정됐어요</div>
    <div id="team-display"></div>
  </div>

  <!-- STEP 4: 스코어 입력 -->
  <div class="screen" id="screen-4" style="display:flex;flex-direction:column;height:100%">
    <div class="score-section" id="score-section" style="flex:1;display:flex;flex-direction:column;"></div>
  </div>

  <!-- STEP 5: 완료 -->
  <div class="screen" id="screen-5">
    <div class="done-screen">
      <div class="done-icon">🎾</div>
      <div class="done-title">경기 저장 완료!</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="done-result" id="done-result"></div>
    </div>
  </div>

</div>

<!-- 푸터 -->
<div class="footer" id="footer">
  <button class="btn btn-back" id="btn-back" onclick="goBack()" style="display:none">← 뒤로</button>
  <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>다음</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ───────────────────────────────────────────────────
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT7pdjtoZw-fvXldKyu3SuCZULh0NsiP6xVURsLXwrH2volDhMPUqs7cnrvBEL_E5Ib5EWEH07EO38G/pub';
const GID_MATCH_G  = '52541838';
const GID_MATCH_BS = '896797118';

// !! Apps Script URL — 나중에 설정 후 여기에 입력
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypETUGCD1AmSDoOCHWJv2N3myAHomeDqPpvnii8gYMkh-JRt5AvIpejFMqYi5PuZF_Rw/exec';

// ── 상태 ───────────────────────────────────────────────────
let curStep = 1;
let league = null;       // 'gold' | 'bs'
let players = [];        // 전체 선수 목록
let selPlayers = [];     // 오늘 선택된 선수
let usedCombos = new Set();
let teamA = [], teamB = [];
let sets = [{a:0, b:0}]; // 세트 스코어

// ── CSV 패치 ────────────────────────────────────────────────
async function fetchCSV(gid, attempt=0) {
  const sheetUrl = `${SHEET}?gid=${gid}&single=true&output=csv`;
  const proxies = [
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(sheetUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${sheetUrl}`,
    `https://corsproxy.io/?${encodeURIComponent(sheetUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(sheetUrl)}`,
  ];
  const url = proxies[attempt % proxies.length];
  try {
    const res = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if (!res.ok) throw new Error('fetch failed');
    const txt = await res.text();
    if (!txt || txt.length < 10) throw new Error('empty');
    return txt.trim().split('\n').map(line => {
      const out=[]; let cur='', q=false;
      for(const ch of line) {
        if(ch==='"'){q=!q;}
        else if(ch===','&&!q){out.push(cur.trim());cur='';}
        else cur+=ch;
      }
      out.push(cur.trim()); return out;
    });
  } catch(e) {
    if(attempt<3){await new Promise(r=>setTimeout(r,800*(attempt+1)));return fetchCSV(gid,attempt+1);}
    throw e;
  }
}

// ── 선수 & 사용된 조합 로드 ────────────────────────────────
async function loadPlayers(lg) {
  const gid = lg === 'gold' ? GID_MATCH_G : GID_MATCH_BS;
  const rows = await fetchCSV(gid);
  const ps = new Set(), us = new Set();
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const p1=r[2]?.trim(),p2=r[3]?.trim(),p3=r[4]?.trim(),p4=r[5]?.trim();
    if(!p1||!p2||!p3||!p4) continue;
    ps.add(p1);ps.add(p2);ps.add(p3);ps.add(p4);
    const key=[[p1,p2].sort().join('|'),[p3,p4].sort().join('|')].sort().join('||');
    us.add(key);
  }
  players = [...ps].sort();
  usedCombos = us;
}

// ── 조합 키 ─────────────────────────────────────────────────
function comboKey(a1,a2,b1,b2) {
  return [[a1,a2].sort().join('|'),[b1,b2].sort().join('|')].sort().join('||');
}

// ── 랜덤 팀 배정 ────────────────────────────────────────────
function assignTeams() {
  const sp = [...selPlayers];
  // 4명 선택
  if(sp.length < 4) { showToast('최소 4명을 선택해야 해요'); return false; }

  // 4명이면 그냥, 4명 초과면 랜덤 4명 선택
  let pool = sp.length === 4 ? sp : shuffle(sp).slice(0, 4);
  
  // 가능한 조합 3가지
  const combos = [
    {a:[pool[0],pool[1]], b:[pool[2],pool[3]]},
    {a:[pool[0],pool[2]], b:[pool[1],pool[3]]},
    {a:[pool[0],pool[3]], b:[pool[1],pool[2]]},
  ];
  
  // 안 한 조합 필터
  const fresh = combos.filter(c => !usedCombos.has(comboKey(c.a[0],c.a[1],c.b[0],c.b[1])));
  const pick = fresh.length > 0 ? fresh[Math.floor(Math.random()*fresh.length)] : combos[Math.floor(Math.random()*3)];
  
  teamA = pick.a;
  teamB = pick.b;
  const isUsed = usedCombos.has(comboKey(teamA[0],teamA[1],teamB[0],teamB[1]));
  return isUsed;
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

// ── Firebase 동기화 헬퍼 ───────────────────────────────────
// sets 배열: [{a,b}, {a,b}, ...] — curSet이 현재 진행중인 세트
// 완료된 세트 = sets[0..curSet-1], 현재 세트 = sets[curSet]
function pushToFirebase() {
  if(typeof window.syncToFirebase !== 'function') return;
  // 완료된 세트 (curSet 이전)
  const setsA = sets.slice(0, curSet).map(s => s.a);
  const setsB = sets.slice(0, curSet).map(s => s.b);
  // 현재 세트 game 점수
  const gameA = sets[curSet]?.a ?? 0;
  const gameB = sets[curSet]?.b ?? 0;
  window.syncToFirebase({
    nameA: teamA.join(' / ') || 'Team A',
    nameB: teamB.join(' / ') || 'Team B',
    setsA,
    setsB,
    gameA,
    gameB,
  });
}

// ── 화면 렌더 ────────────────────────────────────────────────
function renderStep() {
  for(let i=1;i<=4;i++){
    const d=document.getElementById(`dot-${i}`);
    if(d) d.className='step-dot'+(i===curStep?' active':i<curStep?' done':'');
  }
  const sl=document.getElementById('step-label');
  if(sl) sl.textContent=curStep<=4?`STEP ${curStep} / 4`:'완료';

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const scr=document.getElementById(`screen-${curStep}`);
  if(scr) scr.classList.add('active');

  const footer=document.getElementById('footer');
  if(curStep===1){
    footer.innerHTML=`<button class="btn btn-primary" id="btn-next" onclick="goNext()" ${league?'':' disabled'}>다음 →</button>`;
  } else if(curStep===2){
    footer.innerHTML=`<button class="btn btn-back" onclick="goBack()">← 뒤로</button><button class="btn btn-primary" id="btn-next" onclick="goNext()" ${selPlayers.length>=4?'':' disabled'}>팀 배정 →</button>`;
  } else if(curStep===3){
    footer.innerHTML=`<button class="btn btn-back" onclick="goBack()">← 뒤로</button><button class="btn btn-shuffle" onclick="reshuffleTeams()">🔀 다시 뽑기</button><button class="btn btn-primary" onclick="goNext()">스코어 입력 →</button>`;
  } else if(curStep===4){
    const canNextSet = sets.length < 3 && curSet === sets.length - 1;
    const nextSetBtn = canNextSet ? `<button class="btn btn-shuffle" onclick="nextSet()">➡️ 세트 완료</button>` : '';
    footer.innerHTML=`<button class="btn btn-back" onclick="goBack()">← 뒤로</button>${nextSetBtn}<button class="btn btn-save" onclick="saveMatch()">💾 경기 저장</button>`;
  } else if(curStep===5){
    footer.innerHTML=`<button class="btn btn-primary" style="background:var(--gold);color:#000;flex:1" onclick="resetAll()">🎾 새 경기 시작</button>`;
  }
}

// ── STEP 1: 리그 선택 ──────────────────────────────────────
function selectLeague(lg) {
  league = lg;
  document.querySelectorAll('.league-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector(lg==='gold'?'.gold-btn':'.bs-btn').classList.add('on');
  document.getElementById('btn-next').disabled = false;
}

// ── STEP 2: 선수 그리드 렌더 ───────────────────────────────
async function renderPlayerGrid() {
  const wrap = document.getElementById('player-grid-wrap');
  wrap.innerHTML = '<div class="loading-msg"><div class="spinner"></div>선수 목록 불러오는 중...</div>';
  selPlayers = [];
  try {
    await loadPlayers(league);
    wrap.innerHTML = '';
    players.forEach(name => {
      const d = document.createElement('div');
      d.className = 'p-chip';
      d.textContent = name;
      d.onclick = () => togglePlayer(name, d);
      wrap.appendChild(d);
    });
    updateSelCount();
  } catch(e) {
    wrap.innerHTML = `<div class="loading-msg" style="color:var(--red)">⚠️ 선수 목록 불러오기 실패<br><br><button onclick="renderPlayerGrid()" style="padding:14px 28px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:16px;cursor:pointer;font-family:Pretendard,sans-serif;">다시 시도</button></div>`;
  }
}

function togglePlayer(name, el) {
  if(selPlayers.includes(name)) {
    selPlayers = selPlayers.filter(p=>p!==name);
    el.classList.remove('on');
  } else {
    selPlayers.push(name);
    el.classList.add('on');
  }
  updateSelCount();
  document.getElementById('btn-next').disabled = selPlayers.length < 4;
}

function updateSelCount() {
  const n = selPlayers.length;
  document.getElementById('sel-count').innerHTML = `선택된 선수: <em>${n}명</em>${n>=4?' ✓':''}`;
  // 버튼 활성화 동기화
  const btn = document.getElementById('btn-next');
  if(btn) btn.disabled = n < 4;
}

// ── STEP 3: 팀 배정 렌더 ───────────────────────────────────
function renderTeamDisplay() {
  const isUsed = assignTeams();
  const wrap = document.getElementById('team-display');

  if(!teamA.length) { wrap.innerHTML = '<div class="no-combo-msg">😅 선택한 선수들의 모든 조합이 이미 완료됐어요.<br>선수를 추가하거나 변경해주세요.</div>'; return; }

  const badge = isUsed
    ? '<div class="used-badge">⚠️ 이미 진행한 조합이에요</div>'
    : '<div class="ok-badge">✓ 새로운 조합이에요</div>';

  wrap.innerHTML = `
    ${badge}
    <div class="team-display">
      <div class="team-box team-a">
        <div class="team-label">TEAM A</div>
        ${teamA.map(p=>`<div class="team-player">${p}</div>`).join('')}
      </div>
      <div class="vs-box">VS</div>
      <div class="team-box team-b">
        <div class="team-label">TEAM B</div>
        ${teamB.map(p=>`<div class="team-player">${p}</div>`).join('')}
      </div>
    </div>`;

  // 팀 이름 Firebase에 반영
  setTimeout(() => pushToFirebase(), 800);
}

function reshuffleTeams() {
  sets = [{a:0,b:0}];
  renderTeamDisplay();
}

// ── STEP 4: 스코어 렌더 (앱 스타일) ──────────────────────
let curSet = 0;

function renderScoreSection() {
  const sec = document.getElementById('score-section');
  sec.innerHTML = `<div class="score-wrap" id="score-wrap"></div>`;
  renderScoreBoard();
}

function renderScoreBoard() {
  const wrap = document.getElementById('score-wrap');
  if(!wrap) return;

  const tabsHtml = sets.map((s,i) => `
    <button class="set-tab ${i===curSet?'active':''}" onclick="switchSet(${i})">${i+1}세트</button>
  `).join('');

  // curSet을 숫자로 고정해서 inline onclick에 넣음
  const cs = curSet;
  wrap.innerHTML = `
    <div class="set-tabs">${tabsHtml}</div>
    <div class="score-board">
      <div class="score-side side-a">
        <div class="score-side-name">${teamA.join('<br>')}</div>
        <div class="score-big" id="score-a">${sets[cs].a}</div>
        <div class="score-btns">
          <button class="score-btn" onclick="adjustScore(${cs},'a',-1)">−</button>
          <button class="score-btn plus" onclick="adjustScore(${cs},'a',1)">+</button>
        </div>
      </div>
      <div class="score-side side-b">
        <div class="score-side-name">${teamB.join('<br>')}</div>
        <div class="score-big" id="score-b">${sets[cs].b}</div>
        <div class="score-btns">
          <button class="score-btn" onclick="adjustScore(${cs},'b',-1)">−</button>
          <button class="score-btn plus" onclick="adjustScore(${cs},'b',1)">+</button>
        </div>
      </div>
    </div>`;
}

function switchSet(i) {
  curSet = i;
  renderScoreBoard();
  pushToFirebase();
}

function adjustScore(i, team, delta) {
  sets[i][team] = Math.max(0, sets[i][team] + delta);
  const el = document.getElementById(`score-${team}`);
  if(el) el.textContent = sets[i][team];
  pushToFirebase();
}

function addSet() {
  if(sets.length >= 3) return;
  sets.push({a:0,b:0});
  curSet = sets.length - 1;
  renderScoreBoard();
  pushToFirebase();
}

function nextSet() {
  if(sets.length >= 3) return;
  // 현재 세트 점수를 완료된 세트로 확정하고 새 세트 추가
  sets.push({a:0, b:0});
  curSet = sets.length - 1;
  renderScoreBoard();
  renderStep(); // 푸터 버튼 업데이트
  pushToFirebase();
}

// ── 경기 저장 ───────────────────────────────────────────────
async function saveMatch() {
  const btn = document.querySelector('.btn-save');
  btn.textContent = '저장 중...';
  btn.disabled = true;

  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');
  const scoreStr = sets.map(s=>`${s.a}-${s.b}`).join(', ');

  const fullSets = [
    sets[0] || {a:0, b:0},
    sets[1] || {a:0, b:0},
    sets[2] || {a:0, b:0},
  ];

  try {
    const params = new URLSearchParams({
      league,
      date: today,
      t1p1: teamA[0]||'', t1p2: teamA[1]||'',
      t2p1: teamB[0]||'', t2p2: teamB[1]||'',
      s1a: fullSets[0].a, s1b: fullSets[0].b,
      s2a: fullSets[1].a, s2b: fullSets[1].b,
      s3a: fullSets[2].a, s3b: fullSets[2].b,
    });
    const res = await fetch(`${APPS_SCRIPT_URL}?${params}`, {
      method: 'GET',
      credentials: 'omit',
      redirect: 'follow',
    });
    const json = await res.json();
    if(!json.success) throw new Error(json.error || '저장 실패');
    showDone(today, scoreStr);
  } catch(e) {
    showToast('⚠️ 저장 실패: ' + e.message);
    btn.textContent = '💾 경기 저장';
    btn.disabled = false;
  }
}

function showDone(date, scoreStr) {
  const winsA = sets.filter(s=>s.a>s.b).length;
  const winsB = sets.filter(s=>s.b>s.a).length;
  const winner = winsA > winsB ? `🏆 ${teamA.join(' / ')} 승리!` : winsB > winsA ? `🏆 ${teamB.join(' / ')} 승리!` : '🤝 무승부';

  document.getElementById('done-sub').textContent = `${date} · ${league==='gold'?'Gold+':'B&S'} 리그`;
  document.getElementById('done-result').innerHTML = `
    <div style="margin-bottom:12px">${teamA.join(' / ')} <span style="color:var(--text-dim);font-size:14px">vs</span> ${teamB.join(' / ')}</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);letter-spacing:2px;margin-bottom:12px">${scoreStr}</div>
    <div style="color:var(--green)">${winner}</div>`;

  curStep = 5;
  renderStep();
}

// ── 네비게이션 ──────────────────────────────────────────────
async function goNext() {
  if(curStep===1) {
    if(!league) return;
    curStep=2;
    renderStep();
    await renderPlayerGrid();
  } else if(curStep===2) {
    if(selPlayers.length<4) return;
    curStep=3;
    renderStep();
    renderTeamDisplay();
  } else if(curStep===3) {
    sets=[{a:0,b:0}];
    curSet=0;
    curStep=4;
    renderStep();
    renderScoreSection();
    setTimeout(() => pushToFirebase(), 1000);
  }
}

function goBack() {
  if(curStep===2){ curStep=1; league=null; renderStep(); }
  else if(curStep===3){ curStep=2; renderStep(); }
  else if(curStep===4){ curStep=3; renderStep(); renderTeamDisplay(); }
}

function resetAll() {
  curStep=1; league=null; players=[]; selPlayers=[]; teamA=[]; teamB=[]; sets=[{a:0,b:0}]; curSet=0;
  window._sets=[{a:0,b:0}]; window._curSet=0; window._teamA=[]; window._teamB=[];
  const sec = document.getElementById('score-section');
  if(sec) sec.innerHTML = '';
  renderStep();
}

// ── 토스트 ──────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── 초기화 ──────────────────────────────────────────────────
renderStep();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkrib1qzN8IE9NcW8tXTfKb4Z6JsOjcvE",
  authDomain: "ps-score-868bb.firebaseapp.com",
  databaseURL: "https://ps-score-868bb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ps-score-868bb",
  storageBucket: "ps-score-868bb.firebasestorage.app",
  messagingSenderId: "48470302084",
  appId: "1:48470302084:web:b037acc0b58f7e85d191d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const sbRef = ref(db, 'scoreboard');

// Firebase 연결 상태
const connRef = ref(db, '.info/connected');
onValue(connRef, snap => {
  const ok = snap.val() === true;
  const el = document.getElementById('fb-status');
  if(el) { el.textContent = ok ? '🟢 연결됨' : '🔴 연결 중...'; el.style.color = ok ? 'var(--green)' : 'var(--text-dim)'; }
});

// 스코어보드와 동일한 S 객체 구조로 Firebase에 push
// sets[]: 완료된 세트 배열 (스코어보드의 S.a.sets / S.b.sets)
// game: 현재 세트 점수 (스코어보드의 S.a.game / S.b.game)
window.syncToFirebase = function({ nameA, nameB, setsA, setsB, gameA, gameB }) {
  const el = document.getElementById('fb-status');

  // 스코어보드와 완전히 동일한 구조
  const S = {
    title: 'PS i-League 26S1',
    a: {
      name: nameA ?? 'Team A',
      game: gameA ?? 0,
      point: 0,
      sets: setsA ?? [],
      serving: false,
    },
    b: {
      name: nameB ?? 'Team B',
      game: gameB ?? 0,
      point: 0,
      sets: setsB ?? [],
      serving: false,
    },
    superTB: false,
  };

  set(sbRef, S).then(() => {
    if(el) el.textContent = `🟢 동기화됨 (${gameA ?? 0}–${gameB ?? 0})`;
  }).catch(err => {
    if(el) el.textContent = '🔴 오류: ' + err.message;
  });
};
</script>
