<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PS League">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080C10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PS i-League 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #F5C842;
  --gold-dim: #c49a1a;
  --bronze: #CD7F32;
  --bronze-light: #e8a060;
  --bronze-dark: #3a1a00;
  --silver: #A8C0D6;
  --silver-dark: #1e2e3e;
  --green: #2ECC71;
  --green-dark: #0a2018;
  --bg: #080C10;
  --surface: #0E1318;
  --surface2: #141A22;
  --surface3: #1C2430;
  --border: rgba(255,255,255,0.07);
  --text: #F0F4F8;
  --text-dim: #7A8FA0;
  --nav-h: 68px;
  --header-h: 60px;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: var(--nav-h);
}

/* ── 헤더 ── */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-h);
  background: rgba(8,12,16,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

.app-logo {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.app-logo .league {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--gold);
  line-height: 1;
}

.app-logo .season {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-refresh {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.header-refresh:active { transform: scale(0.9); background: var(--surface3); }
.header-refresh.spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 페이지 콘텐츠 ── */
.page { display: none; padding: 0 0 20px; animation: fadeUp 0.25s ease; }
.page.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── 하단 내비게이션 ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(14,19,24,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px 4px;
  transition: all 0.2s;
  position: relative;
}
.nav-item:active { transform: scale(0.93); }

.nav-icon {
  font-size: 22px;
  line-height: 1;
  transition: transform 0.2s;
}
.nav-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.nav-item.active .nav-label { color: var(--gold); }
.nav-item.active .nav-icon { transform: translateY(-2px); }

.nav-dot {
  position: absolute;
  top: 6px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-item.active .nav-dot { opacity: 1; }

/* ── 랭킹 페이지 ── */
.rank-section-header {
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  line-height: 1;
}
.section-title.gold { color: var(--gold); }
.section-title.bs { 
  background: linear-gradient(90deg, var(--bronze-light), var(--silver));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.section-subtitle {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
  margin-top: 2px;
}

/* 탭 스위처 (Gold/B&S) */
.rank-tabs {
  display: flex;
  margin: 0 20px 16px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 4px;
  gap: 4px;
}

.rank-tab {
  flex: 1;
  padding: 9px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Pretendard', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.rank-tab.active-gold {
  background: var(--green-dark);
  color: var(--gold);
  border: 1px solid rgba(245,200,66,0.2);
}
.rank-tab.active-bs {
  background: var(--bronze-dark);
  color: var(--bronze-light);
  border: 1px solid rgba(205,127,50,0.2);
}

/* B&S 필터 */
.bs-filter {
  display: none;
  flex-direction: row;
  gap: 8px;
  padding: 0 20px 14px;
}
.bs-filter.show { display: flex; }
.filter-chip {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  transition: all 0.2s;
}
.filter-chip.all-on { background: var(--surface3); border-color: rgba(255,255,255,0.2); color: var(--text); }
.filter-chip.bronze-on { background: var(--bronze-dark); border-color: var(--bronze); color: var(--bronze-light); }
.filter-chip.silver-on { background: var(--silver-dark); border-color: var(--silver); color: var(--silver); }

/* 랭킹 카드 */
.rank-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

.rank-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s;
}
.rank-card:active { transform: scale(0.98); }
.rank-card.excluded { opacity: 0.38; }
.rank-card.rank-1 { border-color: rgba(245,200,66,0.35); background: linear-gradient(135deg, rgba(245,200,66,0.08), var(--surface)); }
.rank-card.rank-2 { border-color: rgba(192,192,192,0.25); background: linear-gradient(135deg, rgba(192,192,192,0.05), var(--surface)); }
.rank-card.rank-3 { border-color: rgba(205,127,50,0.3); background: linear-gradient(135deg, rgba(205,127,50,0.07), var(--surface)); }
.rank-card.bronze-card { border-left: 3px solid var(--bronze); }
.rank-card.silver-card { border-left: 3px solid var(--silver); }

.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  line-height: 1;
  min-width: 32px;
  text-align: center;
  color: var(--text-dim);
}
.rank-num.r1 { color: var(--gold); font-size: 32px; }
.rank-num.r2 { color: #C0C0C0; }
.rank-num.r3 { color: var(--bronze-light); }
.rank-num.dash { font-size: 20px; }

.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rank-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.rank-stat {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.rank-stat span { color: var(--text); font-weight: 600; }

.cat-badge {
  font-size: 9px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}
.cat-bronze { background: var(--bronze-dark); color: var(--bronze-light); border: 1px solid var(--bronze); }
.cat-silver { background: var(--silver-dark); color: var(--silver); border: 1px solid rgba(168,192,214,0.4); }

.rank-pts {
  text-align: right;
  flex-shrink: 0;
}
.pts-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  line-height: 1;
  color: var(--green);
}
.pts-value.bronze-pts { color: var(--bronze-light); }
.pts-value.silver-pts { color: var(--silver); }
.pts-label { font-size: 9px; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.pts-min { font-size: 10px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 10px; }

/* 스탯 요약 카드 */
.stat-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 16px 16px 0;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}
.stat-card-label {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.stat-card-value {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

/* ── 최근 경기 ── */
.recent-header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.match-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

.match-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.match-card.gold-match { border-left: 3px solid var(--gold); }
.match-card.bs-match { border-left: 3px solid var(--bronze); }

.match-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.match-badge {
  font-size: 9px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}
.gold-badge { background: var(--green-dark); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
.bs-badge { background: var(--bronze-dark); color: var(--bronze-light); border: 1px solid rgba(205,127,50,0.3); }

.match-num {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}
.match-date {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
}

.match-body {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
}

.match-team {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.match-team.right { text-align: right; align-items: flex-end; }

.player-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.match-score-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
}
.score-sets {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 1px;
  line-height: 1.2;
}

/* ── 페어 체커 ── */
.pair-header { padding: 20px 20px 16px; }

.pair-league-tabs {
  display: flex;
  margin: 0 16px 16px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 4px;
  gap: 4px;
}
.pair-league-tab {
  flex: 1;
  padding: 9px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Pretendard', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.pair-league-tab.pg-on { background: var(--green-dark); color: var(--gold); border: 1px solid rgba(245,200,66,0.2); }
.pair-league-tab.pb-on { background: var(--bronze-dark); color: var(--bronze-light); border: 1px solid rgba(205,127,50,0.2); }

.sel-hint {
  margin: 0 16px 14px;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 500;
}
.sel-hint em { color: var(--gold); font-style: normal; font-weight: 700; }

.player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  padding: 0 16px 20px;
}

.player-chip {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  user-select: none;
  font-family: 'Pretendard', sans-serif;
}
.player-chip:active { transform: scale(0.94); }
.player-chip.on {
  background: rgba(46,204,113,0.12);
  border-color: var(--green);
  color: var(--green);
  font-weight: 800;
}
.player-chip.off { opacity: 0.25; pointer-events: none; }

.combo-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

.combo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.combo-card.ok { border-color: rgba(46,204,113,0.3); background: rgba(46,204,113,0.05); }
.combo-card.done { border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.04); opacity: 0.65; }

.combo-teams { flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.combo-team { font-size: 14px; font-weight: 700; color: var(--text); }
.combo-vs { font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; }

.combo-status {
  font-size: 11px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.combo-status.ok { background: rgba(46,204,113,0.12); color: #4ade80; border: 1px solid rgba(46,204,113,0.3); }
.combo-status.done { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }

/* ── 공통 ── */
.status-center {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--surface3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
.placeholder-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 2;
}

.updated-tag {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 500;
}

@media (min-width: 480px) {
  .rank-list, .match-list, .combo-list { max-width: 480px; margin: 0 auto; }
  .rank-tabs, .bs-filter, .pair-league-tabs, .player-grid, .stat-summary { max-width: 480px; margin-left: auto; margin-right: auto; }
  .rank-section-header, .recent-header, .pair-header { max-width: 480px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="app-header">
  <div class="app-logo">
    <span class="league">PS i-League 2026</span>
    <span class="season">Season 1</span>
  </div>
  <button class="header-refresh" id="refreshBtn" onclick="loadData()" title="새로고침">↻</button>
</header>

<!-- 페이지: 랭킹 -->
<div class="page active" id="page-rank">
  <div class="rank-tabs" style="margin-top:16px">
    <button class="rank-tab active-gold" id="tab-gold" onclick="switchRank('gold')">🥇 GOLD+</button>
    <button class="rank-tab" id="tab-bs" onclick="switchRank('bs')">🥉 BRONZE &amp; 🥈 SILVER</button>
  </div>
  <div class="bs-filter" id="bs-filter">
    <button class="filter-chip all-on" onclick="setFilter('all',this)">전체</button>
    <button class="filter-chip" onclick="setFilter('bronze',this)">Bronze</button>
    <button class="filter-chip" onclick="setFilter('silver',this)">Silver</button>
  </div>
  <div id="rank-status" class="status-center"><div class="spinner"></div>데이터 불러오는 중...</div>
  <div id="rank-content" style="display:none">
    <div class="rank-list" id="rank-list"></div>
    <div class="stat-summary" id="stat-summary"></div>
  </div>
</div>

<!-- 페이지: 최근 경기 -->
<div class="page" id="page-recent">
  <div class="recent-header">
    <div>
      <div class="section-title gold" style="font-size:24px">최근 경기</div>
      <div class="section-subtitle">Gold+ · B&S 합산 최근 20경기</div>
    </div>
    <span class="updated-tag" id="updated-recent"></span>
  </div>
  <div id="recent-status" class="status-center" style="display:none"><div class="spinner"></div></div>
  <div class="match-list" id="match-list"></div>
</div>

<!-- 페이지: 페어 체커 -->
<div class="page" id="page-pair">
  <div class="pair-header">
    <div class="section-title" style="color:var(--text);font-size:24px">Pair Checker</div>
    <div class="section-subtitle" style="margin-top:2px">4명 선택 → 가능한 페어 조합 확인</div>
  </div>
  <div class="pair-league-tabs">
    <button class="pair-league-tab pg-on" id="plbg" onclick="setPL('gold')">🥇 Gold+</button>
    <button class="pair-league-tab" id="plbb" onclick="setPL('bs')">🥉 B&amp;S</button>
  </div>
  <div class="sel-hint" id="sel-hint">플레이어를 <em>4명</em> 선택해주세요</div>
  <div class="player-grid" id="player-grid"></div>
  <div class="combo-list" id="combo-list">
    <div class="placeholder-msg">⬆️ 위에서 4명을 선택하면<br>페어 조합이 표시돼요</div>
  </div>
</div>

<!-- 하단 네비게이션 -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-rank" onclick="showPage('rank')">
    <div class="nav-dot"></div>
    <span class="nav-icon">🏆</span>
    <span class="nav-label">랭킹</span>
  </div>
  <div class="nav-item" id="nav-recent" onclick="showPage('recent')">
    <div class="nav-dot"></div>
    <span class="nav-icon">📋</span>
    <span class="nav-label">최근 경기</span>
  </div>
  <div class="nav-item" id="nav-pair" onclick="showPage('pair')">
    <div class="nav-dot"></div>
    <span class="nav-icon">🎾</span>
    <span class="nav-label">Pair Checker</span>
  </div>
</nav>

<script>
// ── 설정 ───────────────────────────────────────────────────
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT7pdjtoZw-fvXldKyu3SuCZULh0NsiP6xVURsLXwrH2volDhMPUqs7cnrvBEL_E5Ib5EWEH07EO38G/pub';
const GID_G        = '2119811539';
const GID_BS       = '1357015090';
const GID_MATCH_G  = '52541838';
const GID_MATCH_BS = '896797118';
const MIN_M = 10, BM = 1.3;

// ── 상태 ───────────────────────────────────────────────────
let curPage = 'rank', rankTab = 'gold', bsFilter = 'all';
let gData = [], bsData = [], recentData = [];
const PLAYERS = { gold: [], bs: [] };
const USED    = { gold: new Set(), bs: new Set() };
let pLeague = 'gold', sel = [];

const ckey = (a,b,c,d) => [[a,b].sort().join('|'),[c,d].sort().join('|')].sort().join('||');

// ── CSV 패치 (proxy 순차 시도) ─────────────────────────────
async function fetchCSV(gid, attempt=0) {
  const sheetUrl = `${SHEET}?gid=${gid}&single=true&output=csv`;
  const proxies = [
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(sheetUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${sheetUrl}`,
    `https://corsproxy.io/?${encodeURIComponent(sheetUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(sheetUrl)}`,
  ];
  const url = proxies[attempt % proxies.length];
  try {
    const res = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if (!res.ok) throw new Error('fetch failed ' + res.status);
    const txt = await res.text();
    if (!txt || txt.length < 10) throw new Error('empty');
    return txt.trim().split('\n').map(line => {
      const out=[]; let cur='', q=false;
      for(const ch of line) {
        if(ch==='"'){ q=!q; }
        else if(ch===','&&!q){ out.push(cur.trim()); cur=''; }
        else cur+=ch;
      }
      out.push(cur.trim()); return out;
    });
  } catch(e) {
    if(attempt < 3) {
      await new Promise(r => setTimeout(r, 800*(attempt+1)));
      return fetchCSV(gid, attempt+1);
    }
    throw e;
  }
}

function score(m, w, s, cat) {
  if (!m) return 0;
  const b = ((w/m)*3 + (s/m)*1) * Math.sqrt(m) * 2;
  return cat === 'Bronze' ? b * BM : b;
}

// ── 데이터 로드 ────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('rank-status').style.display = 'block';
  document.getElementById('rank-status').innerHTML = '<div class="spinner"></div>데이터 불러오는 중...';
  document.getElementById('rank-content').style.display = 'none';

  try {
    const [gr, br, mgr, mbsr] = await Promise.all([
      fetchCSV(GID_G), fetchCSV(GID_BS), fetchCSV(GID_MATCH_G), fetchCSV(GID_MATCH_BS)
    ]);

    // Gold+
    gData = [];
    for (let i = 3; i < gr.length; i++) {
      const r = gr[i]; if (!r[1]) continue;
      const m = +r[2], w = +r[3], l = +r[4], s = +r[5]; if (isNaN(m)) continue;
      gData.push({ name: r[1], m, w, l, s, pts: score(m, w, s, null) });
    }
    gData.sort((a, b) => b.pts - a.pts);

    // B&S
    bsData = [];
    for (let i = 3; i < br.length; i++) {
      const r = br[i]; if (!r[1]) continue;
      const cat = r[2], m = +r[3], w = +r[4], l = +r[5], s = +r[6], cpts = +r[17] || 0;
      if (isNaN(m)) continue;
      bsData.push({ name: r[1], cat, m, w, l, s, cpts, pts: score(m, w, s, cat) });
    }
    bsData.sort((a, b) => b.pts - a.pts);

    // 페어 체커
    for (const [rows, lg] of [[mgr, 'gold'], [mbsr, 'bs']]) {
      const ps = new Set(), us = new Set();
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const p1 = r[2]?.trim(), p2 = r[3]?.trim(), p3 = r[4]?.trim(), p4 = r[5]?.trim();
        if (!p1 || !p2 || !p3 || !p4) continue;
        ps.add(p1); ps.add(p2); ps.add(p3); ps.add(p4);
        us.add(ckey(p1, p2, p3, p4));
      }
      PLAYERS[lg] = [...ps].sort(); USED[lg] = us;
    }

    // 최근 경기
    function parseMatches(rows, league) {
      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i]; if (!r[1] || !r[2] || !r[3] || !r[4] || !r[5]) continue;
        const sets = [];
        for (let s = 0; s < 3; s++) {
          const a = r[6 + s*2]?.trim(), b = r[7 + s*2]?.trim();
          if (a && b && (+a > 0 || +b > 0)) sets.push(`${a}-${b}`);
        }
        if (!sets.length) continue;
        out.push({ date: r[1], league, match: r[0], t1p1: r[2], t1p2: r[3], t2p1: r[4], t2p2: r[5], score: sets.join(' / ') });
      }
      return out;
    }
    recentData = [...parseMatches(mgr, 'G+'), ...parseMatches(mbsr, 'BS')];
    recentData.sort((a, b) => b.date.localeCompare(a.date) || +b.match - +a.match);
    recentData = recentData.slice(0, 20);

    const now = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('updated-recent').textContent = now + ' 업데이트';
    document.getElementById('rank-status').style.display = 'none';
    document.getElementById('rank-content').style.display = 'block';

    renderRank();
    renderRecent();
    renderGrid();
  } catch(e) {
    console.error('loadData error:', e);
    document.getElementById('rank-status').innerHTML = `
      <div style="color:#f87171;font-size:14px">⚠️ 데이터를 불러올 수 없어요<br><br>
      <span style="font-size:12px;color:var(--text-dim)">${e.message}</span><br><br></div>
      <button onclick="loadData()" style="padding:10px 24px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:13px;cursor:pointer;font-family:Pretendard,sans-serif;">다시 시도</button>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── 페이지 전환 ────────────────────────────────────────────
function showPage(p) {
  curPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('nav-' + p).classList.add('active');
}

// ── 랭킹 ──────────────────────────────────────────────────
function switchRank(t) {
  rankTab = t;
  document.getElementById('tab-gold').className = 'rank-tab' + (t === 'gold' ? ' active-gold' : '');
  document.getElementById('tab-bs').className   = 'rank-tab' + (t === 'bs'   ? ' active-bs'   : '');
  document.getElementById('bs-filter').className = 'bs-filter' + (t === 'bs' ? ' show' : '');
  renderRank();
}

function setFilter(f, btn) {
  bsFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.className = 'filter-chip');
  btn.classList.add(f === 'all' ? 'all-on' : f === 'bronze' ? 'bronze-on' : 'silver-on');
  renderRank();
}

function renderRank() {
  const list = document.getElementById('rank-list');
  const summary = document.getElementById('stat-summary');
  list.innerHTML = '';

  if (rankTab === 'gold') {
    let rk = 0;
    gData.forEach(p => {
      const ok = p.m >= MIN_M; if (ok) rk++;
      const rc = ok && rk <= 3 ? `rank-${rk}` : '';
      const nc = ok && rk <= 3 ? `r${rk}` : 'dash';
      const wr = p.m > 0 ? Math.round(p.w / p.m * 100) + '%' : '0%';
      const div = document.createElement('div');
      div.className = `rank-card ${rc} ${!ok ? 'excluded' : ''}`;
      div.innerHTML = `
        <div class="rank-num ${nc}">${ok ? rk : '—'}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}</div>
          <div class="rank-meta">
            <span class="rank-stat"><span>${p.m}</span>경기</span>
            <span class="rank-stat"><span>${p.w}</span>승 <span>${p.l}</span>패</span>
            <span class="rank-stat">승률 <span>${wr}</span></span>
          </div>
        </div>
        <div class="rank-pts">
          ${ok
            ? `<div class="pts-value">${p.pts.toFixed(1)}</div><div class="pts-label">PTS</div>`
            : `<div class="pts-min">10경기 미만</div>`}
        </div>`;
      list.appendChild(div);
    });
    const q = gData.filter(p => p.m >= MIN_M);
    summary.innerHTML = `
      <div class="stat-card"><div class="stat-card-label">🏆 랭킹 등재</div><div class="stat-card-value">${q.length}명 / 전체 ${gData.length}명</div></div>
      <div class="stat-card"><div class="stat-card-label">🥇 1위</div><div class="stat-card-value">${q[0]?.name || '-'}<br><span style="color:var(--gold)">${q[0]?.pts.toFixed(1) || '-'} pts</span></div></div>`;
  } else {
    const fd = bsFilter === 'all' ? bsData : bsData.filter(p => p.cat?.toLowerCase() === bsFilter);
    let rk = 0;
    fd.forEach(p => {
      const ok = p.m >= MIN_M; if (ok) rk++;
      const rc = ok && rk <= 3 ? `rank-${rk}` : '';
      const nc = ok && rk <= 3 ? `r${rk}` : 'dash';
      const ib = p.cat === 'Bronze';
      const wr = p.m > 0 ? Math.round(p.w / p.m * 100) + '%' : '0%';
      const div = document.createElement('div');
      div.className = `rank-card ${rc} ${ib ? 'bronze-card' : 'silver-card'} ${!ok ? 'excluded' : ''}`;
      div.innerHTML = `
        <div class="rank-num ${nc}">${ok ? rk : '—'}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}</div>
          <div class="rank-meta">
            <span class="cat-badge ${ib ? 'cat-bronze' : 'cat-silver'}">${p.cat}</span>
            <span class="rank-stat"><span>${p.m}</span>경기</span>
            <span class="rank-stat"><span>${p.w}</span>승</span>
          </div>
        </div>
        <div class="rank-pts">
          ${ok
            ? `<div class="pts-value ${ib ? 'bronze-pts' : 'silver-pts'}">${p.pts.toFixed(1)}</div><div class="pts-label">PTS</div>`
            : `<div class="pts-min">10경기 미만</div>`}
        </div>`;
      list.appendChild(div);
    });
    const q  = bsData.filter(p => p.m >= MIN_M);
    const bt = q.find(p => p.cat === 'Bronze'), st = q.find(p => p.cat === 'Silver');
    summary.innerHTML = `
      <div class="stat-card"><div class="stat-card-label">🥉 Bronze 1위</div><div class="stat-card-value">${bt?.name || '-'}<br><span style="color:var(--bronze-light)">${bt?.pts.toFixed(1) || '-'} pts</span></div></div>
      <div class="stat-card"><div class="stat-card-label">🥈 Silver 1위</div><div class="stat-card-value">${st?.name || '-'}<br><span style="color:var(--silver)">${st?.pts.toFixed(1) || '-'} pts</span></div></div>`;
  }
}

// ── 최근 경기 ──────────────────────────────────────────────
function renderRecent() {
  const list = document.getElementById('match-list');
  list.innerHTML = '';
  recentData.forEach(m => {
    const isG = m.league === 'G+';
    const div = document.createElement('div');
    div.className = `match-card ${isG ? 'gold-match' : 'bs-match'}`;
    div.innerHTML = `
      <div class="match-top">
        <span class="match-badge ${isG ? 'gold-badge' : 'bs-badge'}">${isG ? 'GOLD+' : 'B&S'}</span>
        <span class="match-num">#${m.match}</span>
        <span class="match-date">${m.date}</span>
      </div>
      <div class="match-body">
        <div class="match-team">
          <div class="player-name">${m.t1p1}</div>
          <div class="player-name">${m.t1p2}</div>
        </div>
        <div class="match-score-box">
          ${m.score.split(' / ').map(s => `<div class="score-sets">${s}</div>`).join('')}
        </div>
        <div class="match-team right">
          <div class="player-name">${m.t2p1}</div>
          <div class="player-name">${m.t2p2}</div>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

// ── 페어 체커 ──────────────────────────────────────────────
function setPL(lg) {
  pLeague = lg; sel = [];
  document.getElementById('plbg').className = 'pair-league-tab' + (lg === 'gold' ? ' pg-on' : '');
  document.getElementById('plbb').className = 'pair-league-tab' + (lg === 'bs'   ? ' pb-on' : '');
  renderGrid(); renderCombos();
}

function toggle(name) {
  if (sel.includes(name)) sel = sel.filter(p => p !== name);
  else { if (sel.length >= 4) return; sel.push(name); }
  renderGrid(); renderCombos();
}

function renderGrid() {
  const grid = document.getElementById('player-grid');
  grid.innerHTML = '';
  PLAYERS[pLeague].forEach(name => {
    const isOn = sel.includes(name), isOff = sel.length >= 4 && !isOn;
    const d = document.createElement('div');
    d.className = 'player-chip' + (isOn ? ' on' : '') + (isOff ? ' off' : '');
    d.textContent = name;
    d.onclick = () => toggle(name);
    grid.appendChild(d);
  });
  const hint = document.getElementById('sel-hint'), n = sel.length;
  if (n === 0) hint.innerHTML = '플레이어를 <em>4명</em> 선택해주세요';
  else if (n < 4) hint.innerHTML = `<em>${n}명 선택됨</em> — ${4 - n}명 더 선택해주세요`;
  else hint.innerHTML = `선택: <em>${sel.join(', ')}</em>`;
}

function renderCombos() {
  const box = document.getElementById('combo-list');
  if (sel.length < 4) { box.innerHTML = '<div class="placeholder-msg">⬆️ 위에서 4명을 선택하면<br>페어 조합이 표시돼요</div>'; return; }
  const [a, b, c, d] = sel;
  const combos = [
    { t1: [a,b], t2: [c,d] }, { t1: [a,c], t2: [b,d] }, { t1: [a,d], t2: [b,c] }
  ].map(co => ({ ...co, used: USED[pLeague].has(ckey(co.t1[0], co.t1[1], co.t2[0], co.t2[1])) }))
   .sort((x, y) => x.used - y.used);
  box.innerHTML = '';
  combos.forEach(co => {
    const div = document.createElement('div');
    div.className = 'combo-card ' + (co.used ? 'done' : 'ok');
    div.innerHTML = `
      <div class="combo-teams">
        <div class="combo-team">${co.t1[0]} / ${co.t1[1]}</div>
        <div class="combo-vs">VS</div>
        <div class="combo-team">${co.t2[0]} / ${co.t2[1]}</div>
      </div>
      <div class="combo-status ${co.used ? 'done' : 'ok'}">${co.used ? '✕ 진행함' : '✓ 가능'}</div>`;
    box.appendChild(div);
  });
}

// ── 초기화 ─────────────────────────────────────────────────
renderGrid();
loadData();

// ── PWA 서비스 워커 등록 ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
